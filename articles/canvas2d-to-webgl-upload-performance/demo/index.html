<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Canvas 2D -> WebGL upload performance</title>
</head>
<body>
    <h1>Canvas 2D → WebGL upload performance</h1>

    <div>
        <label>WebGL preset:
            <select id="gl-preset">
                <option value="720">720p (1280x720)</option>
                <option value="1080" selected="">1080p (1920x1080)</option>
                <option value="2k">2K (2560x1440)</option>
                <option value="4k">4K (3840x2160)</option>
                <option value="8k">8K (7680x4320)</option>
                <option value="custom">custom</option>
            </select>
        </label>
        <label>W: <input type="number" id="gl-width" value="1920"></label>
        <label>H: <input type="number" id="gl-height" value="1080"></label>
    </div>
    <div>
        <label>Canvas 2D preset:
            <select id="c2d-preset">
                <option value="720">720p (1280x720)</option>
                <option value="1080">1080p (1920x1080)</option>
                <option value="2k">2K (2560x1440)</option>
                <option value="4k" selected="">4K (3840x2160)</option>
                <option value="8k">8K (7680x4320)</option>
                <option value="custom">custom</option>
            </select>
        </label>
        <label>W: <input type="number" id="c2d-width" value="3840"></label>
        <label>H: <input type="number" id="c2d-height" value="2160"></label>
    </div>
    <div>
        <label>Number of Canvas 2D: <input type="number" id="c2d-count" value="4" min="1"></label>
        <label>Number of iterations: <input type="number" id="iterations" value="300" min="1"></label>
    </div>
    <div>
        <label>Upload method:
            <select id="upload-method">
                <option value="texSubImage2D" selected="">texSubImage2D (default)</option>
                <option value="texImage2D">texImage2D</option>
            </select>
        </label>
        <label>Number of WebGL contexts (iframes): <input type="number" id="contexts-count" value="1" min="1"></label>
    </div>
    <div>
        <button id="run">Run test</button>
        <span id="status">idle</span>
    </div>

    <h3>Result</h3>
    <table id="result-table" border="1" cellpadding="4" cellspacing="0">
        <thead>
            <tr>
                <th>#</th>
                <th>WebGL size</th>
                <th>Canvas 2D size</th>
                <th>Canvas 2D count</th>
                <th>Upload method</th>
                <th>Iterations</th>
                <th>Contexts</th>
                <th>Per-context FPS</th>
                <th>Sum FPS</th>
                <th>Avg FPS</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <h3>WebGL contexts</h3>
    <div id="frames"></div>

    <script src="index.mjs" type="module"></script>
</body>
</html>
